name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --coverage
        env:
          # Provide dummy keys so audit route compiles; tests don't call APIs
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
